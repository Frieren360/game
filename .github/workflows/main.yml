name: Build

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # -------- LINUX (Ubuntu) --------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y git build-essential cmake \
            libasound2-dev libpulse-dev libx11-dev libxrandr-dev \
            libxi-dev libgl1-mesa-dev libxcursor-dev libxinerama-dev

          git clone https://github.com/raysan5/raylib.git
          cd raylib
          mkdir build && cd build
          cmake .. -DBUILD_SHARED_LIBS=ON
          make -j$(nproc)
          sudo make install

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x compile.sh
          ./compile.sh

      # -------- WINDOWS --------
      - name: Install MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-raylib

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir -p build
          gcc src/game.c -o build/game.exe -lraylib
